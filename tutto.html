<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#c56a3d" />
  <title>Tutto</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spielblock" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-bar">
    <a href="index.html" class="icon-btn back-btn" title="Startseite" aria-label="Zurück zur Startseite">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </a>
    <h1>
      <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="4"/>
        <circle cx="8" cy="8" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="16" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>
      </svg>
      Tutto
    </h1>
    <div class="app-bar__actions">
      <button id="btn-ranking" class="icon-btn" title="Rangliste" aria-label="Rangliste">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
          <path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
          <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
        </svg>
      </button>
      <button id="btn-players" class="icon-btn" title="Spieler verwalten" aria-label="Spieler verwalten">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </button>
      <button id="btn-new" class="icon-btn" title="Neues Spiel" aria-label="Neues Spiel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="tutto-banner" class="tutto-banner" hidden></div>

  <main id="sheet" class="sheet"></main>

  <div class="sheet-actions">
    <button id="btn-add-round" class="btn btn-primary btn-wide">+ Runde hinzufügen</button>
  </div>

  <footer class="hint">
    Trage pro Runde die erwürfelten Punkte ein. Wer zuerst <strong>6000</strong> erreicht, gewinnt.
  </footer>

  <!-- Eingabe-Dialog -->
  <div id="entry-backdrop" class="backdrop" hidden>
    <div class="entry" role="dialog" aria-modal="true" aria-labelledby="entry-title">
      <div class="entry__head">
        <span id="entry-title" class="entry__title">Runde</span>
        <span id="entry-player" class="entry__player"></span>
      </div>
      <div id="entry-options" class="entry__options"></div>
      <div class="entry__custom">
        <button id="entry-sign" class="btn btn-ghost entry-sign" title="Vorzeichen">±</button>
        <input id="entry-input" type="number" inputmode="numeric" placeholder="Punkte" />
        <button id="entry-save" class="btn btn-primary">OK</button>
      </div>
      <div class="entry__foot">
        <button id="entry-clear" class="btn btn-ghost">Leeren</button>
        <button id="entry-cancel" class="btn btn-ghost">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Spieler-Dialog -->
  <div id="players-backdrop" class="backdrop" hidden>
    <div class="entry" role="dialog" aria-modal="true" aria-labelledby="players-title">
      <div class="entry__head">
        <span id="players-title" class="entry__title">Spieler</span>
      </div>
      <ul id="players-list" class="players-list"></ul>
      <div class="entry__custom">
        <input id="player-new" type="text" maxlength="12" placeholder="Neuer Spieler" />
        <button id="player-add" class="btn btn-primary">＋</button>
      </div>
      <div class="entry__foot">
        <button id="players-done" class="btn btn-primary">Fertig</button>
      </div>
    </div>
  </div>

  <!-- Rangliste-Dialog -->
  <div id="ranking-backdrop" class="backdrop" hidden>
    <div class="entry" role="dialog" aria-modal="true" aria-labelledby="ranking-title">
      <div class="entry__head">
        <span id="ranking-title" class="entry__title">
          <svg class="title-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
          </svg>
          Rangliste
        </span>
      </div>
      <div id="ranking-body"></div>
      <div class="entry__foot">
        <button id="ranking-done" class="btn btn-primary">Schließen</button>
      </div>
    </div>
  </div>

  <script src="tutto.js"></script>
</body>
</html>
