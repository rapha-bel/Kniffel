<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#c56a3d" />
  <title>Spielblock</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spielblock" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="home-hero">
    <div class="home-hero__badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="4"/>
        <circle cx="8" cy="8" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="8" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="8" cy="16" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="16" r="1.2" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <h1>Spielblock</h1>
    <p>Wähle ein Spiel</p>
  </header>

  <main class="home">
    <a class="game-card" href="kniffel.html">
      <span class="game-card__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="4"/>
          <circle cx="8" cy="8" r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="8" r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="8" cy="16" r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="16" r="1.3" fill="currentColor" stroke="none"/>
        </svg>
      </span>
      <span class="game-card__text">
        <span class="game-card__name">Kniffel</span>
        <span class="game-card__desc">Punkteblock mit Bonus &amp; Bestenliste</span>
      </span>
      <svg class="game-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
    </a>

    <a class="game-card" href="tutto.html">
      <span class="game-card__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="7" width="14" height="14" rx="4"/>
          <circle cx="6.5" cy="11.5" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="11.5" cy="16.5" r="1.2" fill="currentColor" stroke="none"/>
          <path d="M8.5 5.5 A4 4 0 0 1 12.5 2 h6 A2 2 0 0 1 20.5 4 v6 a4 4 0 0 1-3 3.6"/>
          <circle cx="16" cy="6" r="1.1" fill="currentColor" stroke="none"/>
        </svg>
      </span>
      <span class="game-card__text">
        <span class="game-card__name">Tutto</span>
        <span class="game-card__desc">Rundenpunkte zählen bis 6000</span>
      </span>
      <svg class="game-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
    </a>

    <a class="game-card" href="counter.html">
      <span class="game-card__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="16" rx="3"/><path d="M7 8h10M7 12h10M7 16h6"/>
        </svg>
      </span>
      <span class="game-card__text">
        <span class="game-card__name">Punktezähler</span>
        <span class="game-card__desc">Freier Zähler für jedes Spiel</span>
      </span>
      <svg class="game-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
    </a>

    <div class="game-card game-card--soon" aria-disabled="true">
      <span class="game-card__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </span>
      <span class="game-card__text">
        <span class="game-card__name">Weitere Spiele</span>
        <span class="game-card__desc">folgen bald …</span>
      </span>
    </div>
  </main>

  <footer class="hint">Läuft offline · Punkte bleiben auf diesem Gerät gespeichert</footer>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
