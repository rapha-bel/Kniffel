name: Deploy Kniffel zu GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Service-Worker-Cache automatisch mit dem Commit-Hash versionieren,
      # damit jede Änderung auf dem iPhone übernommen wird.
      - name: Cache-Version stempeln
        run: |
          sed -i "s|const CACHE = .*|const CACHE = 'kniffel-${GITHUB_SHA::7}';|" sw.js
          echo "Neue Cache-Version:" && grep 'const CACHE' sw.js

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
